# Release pipeline. On a push to a release branch, semantic-release reads the
# conventional commits since the last tag, computes the next version, and (when
# warranted) updates CHANGELOG/package.json, tags, creates a GitHub Release, and
# publishes to npm.
#
#   main      -> @latest
#   next      -> @next prerelease
#   feat/**   -> per-branch prerelease channel
#
# OPT-IN. docevals has never been published, and a first publish to npm cannot
# be undone, so this job runs only when the repository variable RELEASE_ENABLED
# is set to "true":
#
#   gh variable set RELEASE_ENABLED --body true --repo hawkeyexl/docevals
#
# Before enabling, configure npm trusted publishing for the package so the
# publish step can authenticate without an NPM_TOKEN. On npmjs.com, add a
# trusted publisher for `docevals` naming this repository and this workflow
# file (release.yml). npm then exchanges the workflow's OIDC token for a
# short-lived, scoped publish credential — which is what `id-token: write`
# below authorizes — and mints provenance automatically.
#
# The release commit and tag are pushed with the default GITHUB_TOKEN. That
# works while `main` has no ruleset requiring changes to arrive via PR. If such
# a ruleset is added, the default token can no longer push (GH013) and this
# needs a GitHub App token whitelisted as a bypass actor, as docmeta does.

name: Release

on:
  push:
    branches:
      - main
      - next
      - "feat/**"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write # OIDC trusted publishing to npm + provenance

jobs:
  release:
    if: vars.RELEASE_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # The husky commit-msg hook isn't useful in CI, and semantic-release's
      # release commit embeds the full changelog (long lines).
      HUSKY: "0"
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      # npm install, not ci — see the lockfile note in CLAUDE.md.
      - run: npm install --no-fund --no-audit
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
