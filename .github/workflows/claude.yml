name: Claude Code

# Interactive counterpart to claude-pr-review.yml: that one reviews every PR
# automatically, this one responds when a human writes `@claude` in an issue,
# a PR comment, or a review.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Two conditions must both hold: the body mentions @claude, and the author
    # is trusted. The author_association gate is the security control — without
    # it, anyone who can comment on a public repo could run Claude against it.
    if: |
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@claude') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' &&
       contains(github.event.review.body, '@claude') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)) ||
      (github.event_name == 'issues' &&
       (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Lets Claude read CI results on PRs.
    env:
      # `secrets` is not available in a job-level `if`, and this job's `if` is
      # already spoken for by the mention gate, so surface the token as an env
      # flag and gate the steps on it. Without this the action hard-fails
      # whenever someone types @claude before the secret is configured.
      HAS_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
    steps:
      - name: Skip when no token is configured
        if: env.HAS_TOKEN != 'true'
        run: |
          echo "::notice title=Claude skipped::CLAUDE_CODE_OAUTH_TOKEN is not set on this repository. Set it with: gh secret set CLAUDE_CODE_OAUTH_TOKEN --repo ${{ github.repository }}"

      - name: Checkout repository
        if: env.HAS_TOKEN == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        if: env.HAS_TOKEN == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # No `prompt` on purpose: Claude follows the instructions in the
          # comment that tagged it.
          additional_permissions: |
            actions: read
